<!DOCTYPE html>
<html>
<head>
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ff758c, #ff7eb3);
            color: white;
        }
        .container {
            padding: 50px;
        }
        img {
            width: 250px;
            border-radius: 20px;
            margin: 20px;
        }
        h1 {
            font-size: 40px;
        }
        p {
            font-size: 20px;
            max-width: 600px;
            margin: auto;
        }
        .heart {
            font-size: 40px;
            animation: beat 1s infinite;
        }
        @keyframes beat {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Happy Birthday ❤️</h1>

        <img src="https://via.placeholder.com/250" alt="Her Photo">

        <p>
            You walked into my life quietly…  
            but became the most beautiful part of it.  
            I just want you to know…  
            you mean a lot more than words can say ❤️
        </p>

        <div class="heart">❤️</div>

        <p>— From Someone Who Cares About You</p>
    </div>
</body>
</html>
